stages:
  - test
  - build

unit-test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -e ".[dev]"
  script:
    - pytest tests/ -v --junitxml=pytest-report.xml
  artifacts:
    reports:
      junit: pytest-report.xml

docker-build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t harness-agent .
  only:
    - main